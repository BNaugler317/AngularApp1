
<div class="page">
  <div class="dashboard">
    
    <app-user-card [user]="user"></app-user-card>

    <app-user-status
      [isOnline]="user.isOnline"
      (statusChange)="user.isOnline = $event">
    </app-user-status>

    <app-user-bio
      [bio]="user.bio"
      (bioChange)="user.bio = $event">
    </app-user-bio>

  </div>
</div>
